<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحريك مجسم من الهاتف عبر الرابط</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #1a1a1a; font-family: Arial, sans-serif; }
        #canvas-container { width: 100vw; height: 85vh; }
        .controls { width: 100vw; height: 15vh; display: flex; justify-content: center; align-items: center; gap: 10px; background: #222; }
        button { padding: 12px 18px; font-size: 14px; font-weight: bold; border: none; border-radius: 8px; background-color: #ff4757; color: white; cursor: pointer; }
        button:active { background-color: #ff6b81; }
    </style>
</head>
<body>

    <div id="canvas-container"></div>
    
    <div class="controls">
        <button id="runBtn">🏃‍♂️ حركة الجري</button>
        <button id="shootBtn">💥 قتال وإطلاق نار</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, mixer, model, controls;
        let animationsMap = {}; // لتخزين الحركات الجاهزة
        let activeAction;
        let clock = new THREE.Clock();

        init();

        function init() {
            const container = document.getElementById('canvas-container');

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a1a); // لون الخلفية رمادي غامق لتتأكد أن المحرك يعمل
            
            camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.set(0, 3, 10);

            // إضافة إضاءة قوية من كل الجهات حتى لا يظهر المجسم أسود
            const ambientLight = new THREE.AmbientLight(0xffffff, 1.5);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 2);
            dirLight.position.set(5, 10, 7);
            scene.add(dirLight);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            const loader = new GLTFLoader();
            
            // ⚠️ ضع رابط الـ Raw المباشر لمجسمك هنا (الذي يحتوي على الحركات)
            const modelURL = 'https://drive.google.com/file/d/17pzwCl03SVdZSF24wJcTkVgp65-tmBeT/view?usp=drivesdk'; 

            loader.load(modelURL, function (gltf) {
                model = gltf.scene;
                scene.add(model);

                // كود ذكي لضبط الكاميرا تلقائياً على حجم المجسم مهما كان كبيراً
                const box = new THREE.Box3().setFromObject(model);
                const size = box.getSize(new THREE.Vector3());
                const center = box.getCenter(new THREE.Vector3());
                
                controls.target.copy(center);
                camera.position.set(center.x, center.y + size.y / 2, center.z + size.length() * 1.2);
                controls.update();

                // قراءة الحركات الجاهزة المخزنة داخل الملف
                if (gltf.animations && gltf.animations.length > 0) {
                    mixer = new THREE.AnimationMixer(model);
                    
                    // طباعة أسماء الحركات في الـ Console لمعرفتها
                    console.log("الحركات المكتشفة:", gltf.animations.map(a => a.name));

                    // تخزين الحركات لتشغيلها عبر الأزرار
                    gltf.animations.forEach((clip) => {
                        animationsMap[clip.name.toLowerCase()] = mixer.clipAction(clip);
                    });

                    // تشغيل الحركة الأولى تلقائياً (حركة الوقوف مثلاً)
                    activeAction = Object.values(animationsMap)[0];
                    if(activeAction) activeAction.play();
                }

            }, function(xhr) {
                // لمتابعة التحميل في الـ Console ومعرفة إن كان الملف كبيراً ويأخذ وقتاً
                console.log((xhr.loaded / xhr.total * 100) + '% loaded');
            }, function (e) { 
                console.error("خطأ في تحميل الملف، تأكد من الرابط والـ CORS:", e); 
            });

            // ربط أزرار الهاتف بالحركات الجاهزة
            document.getElementById('runBtn').addEventListener('click', () => {
                fadeToAnimation('run'); // استبدل 'run' بالاسم الفعلي للحركة لديك إذا كان مختلفاً
            });

            document.getElementById('shootBtn').addEventListener('click', () => {
                fadeToAnimation('shoot'); // استبدل 'shoot' بالاسم الفعلي للحركة لديك إذا كان مختلفاً
            });

            animate();
        }

        // دالة الانتقال السلس بين الحركات الجاهزة
        function fadeToAnimation(name) {
            // البحث عن الحركة (تتحقق من الاسم الصغير)
            let targetAction = null;
            Object.keys(animationsMap).forEach(key => {
                if(key.includes(name)) {
                    targetAction = animationsMap[key];
                }
            });

            if (targetAction && targetAction !== activeAction) {
                if (activeAction) activeAction.fadeOut(0.3);
                targetAction.reset().fadeIn(0.3).play();
                activeAction = targetAction;
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            if (mixer) mixer.update(delta);
            if (controls) controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            const container = document.getElementById('canvas-container');
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });
    </script>
</body>
</html>
