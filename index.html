<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مستعرض حركات المافيا المحلي</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #1a1a1a; font-family: Arial, sans-serif; }
        canvas { display: block; }
        
        /* قائمة الأزرار الجانبية للتمرير على الهاتف */
        #controls-container {
            position: absolute;
            top: 10px;
            left: 10px;
            max-height: 85vh;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
            z-index: 10;
            padding-right: 12px;
        }
        
        button {
            padding: 10px 14px;
            font-size: 13px;
            font-weight: bold;
            background-color: #e91e63;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            box-shadow: 0 3px 6px rgba(0,0,0,0.3);
            text-align: right;
            min-width: 160px;
        }
        button:active { background-color: #c2185b; transform: scale(0.97); }

        #status {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.75);
            color: #fff;
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 13px;
            pointer-events: none;
            z-index: 10;
            direction: rtl;
        }
    </style>
</head>
<body>

    <div id="status">الحركة الحالية: وضعية الرشاش</div>

    <div id="controls-container">
        <button onclick="changeAnim('Rifle Aiming Idle.glb', '1. وضعية الرشاش')">1. وضعية الرشاش</button>
        <button onclick="changeAnim('Sprint Backward.glb', '2. ركض للخلف')">2. ركض للخلف</button>
        <button onclick="changeAnim('Double Dagger Stab.glb', '3. طعن بالخنجر')">3. طعن بالخنجر</button>
        <button onclick="changeAnim('Dying.glb', '4. حركة الموت 1')">4. حركة الموت 1</button>
        <button onclick="changeAnim('Firing Rifle.glb', '5. إطلاق النار')">5. إطلاق النار</button>
        <button onclick="changeAnim('Jump Up.glb', '6. قفز للأعلى')">6. قفز للأعلى</button>
        <button onclick="changeAnim('Death From Right.glb', '7. حركة الموت 2')">7. حركة الموت 2</button>
        <button onclick="changeAnim('Rifle Turn And Kick.glb', '8. التفات وركل')">8. التفات وركل</button>
        <button onclick="changeAnim('Mma Kick.glb', '9. ركلة MMA')">9. ركلة MMA</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        // الكود البرمجي المستقر
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // إضاءة قوية جداً لكساء اللحم والملابس
        const ambientLight = new THREE.AmbientLight(0xffffff, 2.5);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 2.0);
        dirLight.position.set(3, 10, 5);
        scene.add(dirLight);

        const loader = new THREE.GLTFLoader();
        let mixer, currentModel;

        window.loadModel = function(fileName) {
            if (currentModel) scene.remove(currentModel);
            if (mixer) mixer.stopAllAction();

            // التحميل محلياً من نفس المجلد
            loader.load(fileName, (gltf) => {
                currentModel = gltf.scene;
                scene.add(currentModel);

                // ضبط وضعية المجسم في المنتصف تماماً
                currentModel.position.set(0, -60, 0);
                currentModel.scale.set(1, 1, 1); 

                if (gltf.animations.length > 0) {
                    mixer = new THREE.AnimationMixer(currentModel);
                    const action = mixer.clipAction(gltf.animations[0]);
                    action.play();
                }
            }, undefined, (error) => {
                console.error("الملف غير موجود في المجلد، تأكد من نقل الملفات بجانب index.html");
            });
        }

        // تشغيل الحركة الأولى تلقائياً من الذاكرة
        window.loadModel('Rifle Aiming Idle.glb');

        // إعدادات الكاميرا المخصصة لرجال المافيا عندك
        camera.position.set(0, 30, 140);
        camera.lookAt(0, 30, 0);

        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            if (mixer) mixer.update(delta);
            renderer.render(scene, camera);
        }
        animate();

        // دالة تغيير الحركة عند الضغط
        window.changeAnim = function(fileName, animName) {
            document.getElementById('status').innerText = "الحركة الحالية: " + animName;
            window.loadModel(fileName);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
