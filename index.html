<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحريك مجسم من الهاتف عبر الرابط</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #111; font-family: Arial, sans-serif; }
        #canvas-container { width: 100vw; height: 80vh; }
        .controls { width: 100vw; height: 20vh; display: flex; justify-content: center; align-items: center; gap: 10px; background: #222; }
        button { padding: 15px 20px; font-size: 16px; font-weight: bold; border: none; border-radius: 8px; background-color: #ff4757; color: white; cursor: pointer; }
        button:active { background-color: #ff6b81; }
    </style>
</head>
<body>

    <div id="canvas-container"></div>
    
    <div class="controls">
        <button id="runBtn">🏃‍♂️ حركة الجري</button>
        <button id="shootBtn">💥 قتال وإطلاق نار</button>
    </div>

    <!-- استدعاء Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, mixer, model;
        let clock = new THREE.Clock();

        init();

        function init() {
            const container = document.getElementById('canvas-container');

            // 1. المشهد والكاميرا
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a1a);
            
            camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 100);
            camera.position.set(0, 2, 5);

            // 2. الإضاءة
            const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 2);
            hemiLight.position.set(0, 20, 0);
            scene.add(hemiLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 2);
            dirLight.position.set(3, 10, 10);
            scene.add(dirLight);

            // 3. المحرك (Renderer) ودعم اللمس للهاتف
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            // التحكم بالمجسم باللمس (لف، تكبير)
            const controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.target.set(0, 1, 0);

            // 4. تحميل مجسمك الجامد عبر رابط الـ HTTPS الخاص بك
            const loader = new GLTFLoader();
            
            // ⚠️ ضع رابط الـ https للمجسم الخاص بك هنا بدلاً من الرابط التجريبي
            const modelURL = 'https://drive.google.com/file/d/17pzwCl03SVdZSF24wJcTkVgp65-tmBeT/view?usp=drivesdk'; 

            loader.load(modelURL, function (gltf) {
                model = gltf.scene;
                scene.add(model);

                // إنشاء الـ Mixer المسؤول عن إدارة الحركات
                mixer = new THREE.AnimationMixer(model);

                // إذا كان الرابط يحتوي على حركات مخفية سيتم قراءتها هنا
                if (gltf.animations && gltf.animations.length > 0) {
                    // تشغيل الحركة الأولى تلقائياً كمثال
                    mixer.clipAction(gltf.animations[0]).play();
                }

            }, undefined, function (e) { console.error(e); });

            // 5. أحداث أزرار الهاتف
            document.getElementById('runBtn').addEventListener('click', () => {
                simulateMotion('run');
            });

            document.getElementById('shootBtn').addEventListener('click', () => {
                simulateMotion('shoot');
            });

            animate();
        }

        // دالة لمحاكاة الحركات برمجياً في حال كان المجسم جامداً تماماً
        function simulateMotion(type) {
            if (!model) return;

            if (type === 'run') {
                // محاكاة حركة الجري برمجياً عبر اهتزاز وتحريك العقد الزاوية (تهز المجسم للأمام والخلف)
                let time = performance.now() * 0.005;
                model.position.z = Math.sin(time) * 0.5; // يتقدم ويتراجع
                model.rotation.y = Math.sin(time) * 0.1; // يميل يميناً ويساراً كأنه يجري
            } 
            else if (type === 'shoot') {
                // محاكاة إطلاق النار (ارتداد سريع للخلف)
                model.position.z -= 0.2; // ارتداد السلاح
                setTimeout(() => { model.position.z += 0.2; }, 50);
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();
            if (mixer) mixer.update(delta);

            renderer.render(scene, camera);
        }

        // ضبط المقاسات عند تدوير الشاشة في الهاتف
        window.addEventListener('resize', () => {
            const container = document.getElementById('canvas-container');
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });
    </script>
</body>
</html>
